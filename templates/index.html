<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Attrition Prediction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
                        url('https://images.unsplash.com/photo-1556740749-887f6717d7e4');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            width: 100%;
            margin: 20px;
            max-width: 920px;
            background: rgba(255, 255, 255, 0.09);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 45px 50px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 35px;
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px 35px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14.5px;
            font-weight: 500;
            opacity: 0.95;
        }
        input, select {
            width: 100%;
            padding: 13px 16px;
            border-radius: 12px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-size: 15.5px;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            background: rgba(255,255,255,0.22);
            box-shadow: 0 0 0 3px rgba(0, 198, 255, 0.3);
        }
        input::placeholder {
            color: #ccc;
        }
        select option {
            color: #000;
        }
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            grid-column: 1 / -1;
        }
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-predict {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
        }
        .btn-reset {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,114,255,0.5);
        }
        .btn-reset:hover {
            background: rgba(255,255,255,0.25);
        }
        .result {
            margin-top: 30px;
            padding: 25px;
            border-radius: 16px;
            background: rgba(0, 255, 120, 0.12);
            border: 1px solid rgba(0,255,120,0.4);
            text-align: center;
            grid-column: 1 / -1;
            animation: fadeIn 0.6s ease;
        }
        .error {
            margin-top: 30px;
            padding: 18px;
            border-radius: 12px;
            background: rgba(255, 80, 80, 0.15);
            border: 1px solid rgba(255,80,80,0.5);
            grid-column: 1 / -1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 35px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Employee Attrition Prediction</h1>
        
        <form action="/predict" method="POST">
            <div class="form-grid">
                <!-- Column 1 -->
                <div>
                    <label for="Age">Age</label>
                    <input type="number" id="Age" name="Age" required min="18" max="60">

                    <label for="Gender">Gender</label>
                    <select id="Gender" name="Gender" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>

                    <label for="Marital_Status">Marital Status</label>
                    <select id="Marital_Status" name="Marital_Status" required>
                        <option value="Married">Married</option>
                        <option value="Single">Single</option>
                        <option value="Divorced">Divorced</option>
                    </select>

                    <label for="Job_Role">Job Role</label>
                    <select id="Job_Role" name="Job_Role" required>
                        <option value="Manager">Manager</option>
                        <option value="Assistant">Assistant</option>
                        <option value="Analyst">Analyst</option>
                        <option value="Executive">Executive</option>
                    </select>
                </div>

                <!-- Column 2 -->
                <div>
                    <label for="Department">Department</label>
                    <select id="Department" name="Department" required>
                        <option value="Finance">Finance</option>
                        <option value="HR">HR</option>
                        <option value="IT">IT</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Sales">Sales</option>
                    </select>

                    <label for="Monthly_Income">Monthly Income</label>
                    <input type="number" id="Monthly_Income" name="Monthly_Income" required min="0">

                    <label for="Years_at_Company">Years at Company</label>
                    <input type="number" id="Years_at_Company" name="Years_at_Company" required min="0">

                    <label for="Overtime">Overtime</label>
                    <select id="Overtime" name="Overtime" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-predict">Predict Attrition</button>
                <button type="reset" class="btn-reset">Reset Form</button>
            </div>
        </form>

        {% if prediction %}
        <div class="result">
            <h2>✅ Prediction Result</h2>
            <p style="font-size: 1.4rem; margin: 15px 0;"><strong>{{ prediction }}</strong></p>
            <p>Probability of leaving: <strong>{{ probability }}%</strong></p>
        </div>
        {% endif %}

        {% if error %}
        <div class="error">
            <p>❌ Error: {{ error }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
